<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Exoscape — Deep Field Navigation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono&display=swap">
  <link rel="stylesheet" href="./styles.css">
  <script type="importmap">
  { "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <main id="exo-root">
    <canvas id="exo-canvas"></canvas>
    <div id="exo-labels"></div>

    <div class="scrim scrim-top"></div>
    <div class="scrim scrim-bottom"></div>
    <div class="hud-frame"></div>

    <header class="mission">
      <div class="mission-row">
        <span class="mission-dot"></span>
        <span class="mission-title">EXOSCAPE</span>
        <span class="mission-sep">/</span>
        <span class="mission-sub">DEEP&nbsp;FIELD&nbsp;NAVIGATION</span>
      </div>
      <div class="mission-meta">LINK&nbsp;◦&nbsp;STABLE&nbsp;&nbsp;&nbsp;FEED&nbsp;◦&nbsp;2160P&nbsp;&nbsp;&nbsp;SECTOR&nbsp;001</div>
    </header>

    <div class="status">
      <div>OBSERVATORY&nbsp;·&nbsp;CASSINI&nbsp;BAY</div>
      <div>RA&nbsp;14h&nbsp;39m&nbsp;&nbsp;DEC&nbsp;−60°50′</div>
      <div class="live">SCAN&nbsp;◦&nbsp;LIVE</div>
    </div>

    <section class="name-block">
      <div class="designation"></div>
      <h1></h1>
      <p class="blurb"></p>
    </section>

    <aside class="data-panel">
      <div class="panel-head">
        <span class="label">PLANETARY&nbsp;DATA</span>
        <span class="spacer"></span>
        <span class="panel-desig"></span>
      </div>
      <div class="stats"></div>
    </aside>

    <nav class="station-nav" aria-label="Station navigation"></nav>

    <div class="nav-hint">
      <div class="hint-text"></div>
      <div class="hint-arrow">⌄&nbsp;⌄</div>
    </div>

    <div id="poi-card">
      <div class="poi-card-inner">
        <div class="poi-head">
          <span class="dot"></span>
          <span class="tag">SURFACE&nbsp;MARKER</span>
          <span class="spacer"></span>
          <button class="poi-close" aria-label="Close">×</button>
        </div>
        <div class="poi-name"></div>
        <div class="poi-sub"></div>
        <div class="poi-coord"></div>
      </div>
    </div>

    <div class="vignette"></div>
    <div class="grain"></div>
  </main>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
