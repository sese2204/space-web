document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\u002Fdiv>\n    <div style=\"color:#7fb8ff;opacity:.85\">SCAN&nbsp;◦&nbsp;LIVE<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- planet name block : bottom-left -->\n  <div style=\"position:absolute;left:46px;bottom:56px;z-index:5;max-width:36vw\">\n    <div style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.3em;color:#7fb8ff;opacity:.85\">{{ designation }}<\u002Fdiv>\n    <h1 style=\"font-weight:300;font-size:clamp(42px,6.4vw,92px);line-height:.96;letter-spacing:-.015em;margin-top:12px\">{{ name }}<\u002Fh1>\n    <p style=\"margin-top:18px;font-size:15px;line-height:1.55;opacity:.7;max-width:32ch;text-wrap:pretty\">{{ blurb }}<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- data panel : bottom-right -->\n  <div style=\"position:absolute;right:46px;bottom:56px;z-index:5;width:308px\">\n    <div style=\"display:flex;align-items:center;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.18)\">\n      <span style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.22em;opacity:.8\">PLANETARY&nbsp;DATA<\u002Fspan>\n      <span style=\"flex:1\"><\u002Fspan>\n      <span style=\"font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.14em;color:#7fb8ff\">{{ designation }}<\u002Fspan>\n    <\u002Fdiv>\n    <sc-for list=\"{{ stats }}\" as=\"row\" hint-placeholder-count=\"5\">\n      <div style=\"display:flex;justify-content:space-between;align-items:baseline;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.07)\">\n        <span style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;opacity:.5\">{{ row.k }}<\u002Fspan>\n        <span style=\"font-weight:500;font-size:15px;letter-spacing:.01em\">{{ row.v }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- station selector : left, under mission tag -->\n  <div style=\"position:absolute;left:46px;top:104px;z-index:6;display:flex;flex-direction:column;gap:3px;align-items:flex-start\">\n    <sc-for list=\"{{ nav }}\" as=\"item\" hint-placeholder-count=\"7\">\n      <button onclick=\"{{ item.onClick }}\" style=\"display:flex;align-items:center;gap:13px;justify-content:flex-start;background:none;border:none;cursor:pointer;padding:8px 0;color:inherit;font:inherit\">\n        <sc-if value=\"{{ item.active }}\" hint-placeholder-val=\"{{ false }}\">\n          <span style=\"width:24px;height:2px;background:#7fb8ff;box-shadow:0 0 9px #7fb8ff\"><\u002Fspan>\n          <span style=\"font-weight:500;font-size:12px;letter-spacing:.16em;color:#eef4ff\">{{ item.label }}<\u002Fspan>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ item.inactive }}\" hint-placeholder-val=\"{{ true }}\">\n          <span style=\"width:10px;height:2px;background:rgba(255,255,255,.5);opacity:.5\"><\u002Fspan>\n          <span style=\"font-weight:500;font-size:12px;letter-spacing:.16em;opacity:.42\">{{ item.label }}<\u002Fspan>\n        <\u002Fsc-if>\n        <span style=\"font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;opacity:.35\">{{ item.idx }}<\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- nav hint : bottom-center -->\n  <div style=\"position:absolute;left:50%;bottom:34px;transform:translateX(-50%);z-index:5;display:flex;flex-direction:column;align-items:center;gap:9px;opacity:.7;pointer-events:none\">\n    <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.26em\">{{ hint }}<\u002Fdiv>\n    <div style=\"animation:exoFloat 2.3s ease-in-out infinite;font-size:13px;opacity:.55;letter-spacing:.1em\">⌄&nbsp;⌄<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- POI info card -->\n  <sc-if value=\"{{ poiActive }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute;left:50%;bottom:108px;transform:translateX(-50%);z-index:7;width:312px;pointer-events:auto\">\n    <div style=\"background:rgba(8,12,20,.74);backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);border:1px solid rgba(127,184,255,.32);padding:16px 18px 18px;box-shadow:0 12px 40px rgba(0,0,0,.5)\">\n      <div style=\"display:flex;align-items:center;gap:9px\">\n        <span style=\"width:7px;height:7px;border-radius:50%;background:#7fb8ff;box-shadow:0 0 9px #7fb8ff\"><\u002Fspan>\n        <span style=\"font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.22em;color:#7fb8ff\">SURFACE&nbsp;MARKER<\u002Fspan>\n        <span style=\"flex:1\"><\u002Fspan>\n        <button onclick=\"{{ closePoi }}\" style=\"background:none;border:none;color:#9fb0c8;cursor:pointer;font-size:16px;line-height:1;padding:0 2px\">×<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"font-weight:500;font-size:22px;letter-spacing:.01em;margin-top:11px\">{{ poiName }}<\u002Fdiv>\n      <div style=\"font-size:13px;line-height:1.5;opacity:.66;margin-top:5px;text-wrap:pretty\">{{ poiSub }}<\u002Fdiv>\n      <div style=\"font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.16em;opacity:.45;margin-top:13px\">{{ poiCoord }}<\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- vignette + grain -->\n  <div style=\"position:absolute;inset:0;z-index:4;pointer-events:none;background:radial-gradient(ellipse at center,transparent 52%,rgba(2,3,8,.78) 100%)\"><\u002Fdiv>\n  <div style=\"position:absolute;inset:0;z-index:4;pointer-events:none;opacity:.045;mix-blend-mode:overlay;background-image:url('data:image/svg+xml;utf8,&lt;svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22120%22 height=%22120%22&gt;&lt;filter id=%22n%22&gt;&lt;feTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22 numOctaves=%222%22/&gt;&lt;/filter&gt;&lt;rect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23n)%22/&gt;&lt;/svg&gt;')\"><\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { station: 0 };\n\n  _data() {\n    return [\n      {\n        navLabel: 'DEEP FIELD', designation: 'HELIOCENTRIC VIEW', name: 'LOCAL SYSTEM',\n        blurb: '태양과 네 행성, 그리고 달이 함께하는 권역을 항해합니다.',\n        hint: '행성을 선택해 진입  ·  드래그로 둘러보기',\n        stats: [\n          { k: '항성', v: '1 · Sol' },\n          { k: '행성', v: '4' },\n          { k: '위성', v: '1 · Luna' },\n          { k: '탐사 상태', v: 'ACTIVE' },\n        ],\n      },\n      {\n        navLabel: 'SOL', designation: 'SOL · G2V STAR', name: 'THE SUN',\n        blurb: '태양계 전체 질량의 99.86%를 차지하는 항성. 모든 행성에 빛과 열을 공급합니다.',\n        hint: '드래그로 시점 이동  ·  휠로 확대/축소',\n        stats: [\n          { k: '지름', v: '1,392,700 km' },\n          { k: '표면 온도', v: '5,500 °C' },\n          { k: '중심핵', v: '1,500만 °C' },\n          { k: '질량', v: '1.989×10³⁰ kg' },\n          { k: '분류', v: 'G2V 주계열성' },\n          { k: '나이', v: '46억 년' },\n        ],\n      },\n      {\n        navLabel: 'EARTH', designation: 'TERRA · SOL III', name: 'EARTH',\n        blurb: '생명이 존재하는 유일하게 알려진 행성. 표면의 71%가 액체 물로 덮여 있습니다.',\n        hint: '드래그로 시점 이동  ·  휠로 확대/축소',\n        stats: [\n          { k: '지름', v: '12,742 km' },\n          { k: '태양까지', v: '149.6M km' },\n          { k: '표면 중력', v: '9.807 m/s²' },\n          { k: '자전 주기', v: '23h 56m' },\n          { k: '평균 기온', v: '15 °C' },\n          { k: '위성', v: '1 · Luna' },\n        ],\n        pois: [\n          { id: 'amazon', name: '아마존 분지', sub: '지구 최대 열대우림 · 산소의 근원', lat: -3, lon: -60 },\n          { id: 'sahara', name: '사하라 사막', sub: '세계 최대 고온 사막 · 940만 km²', lat: 23, lon: 13 },\n          { id: 'himalaya', name: '히말라야 산맥', sub: '에베레스트 8,849 m · 지구 최고봉', lat: 28, lon: 84 },\n          { id: 'reef', name: '그레이트 베리어 리프', sub: '세계 최대 산호초 · 우주에서 보임', lat: -18, lon: 147 },\n        ],\n      },\n      {\n        navLabel: 'MOON', designation: 'LUNA · EARTH I', name: 'MOON',\n        blurb: '지구의 유일한 자연 위성. 밀물과 썰물, 자전축의 안정을 만들어 냅니다.',\n        hint: '드래그로 시점 이동  ·  휠로 확대/축소',\n        stats: [\n          { k: '지름', v: '3,474 km' },\n          { k: '지구까지', v: '384,400 km' },\n          { k: '표면 중력', v: '1.62 m/s²' },\n          { k: '공전 주기', v: '27.3 d' },\n          { k: '표면 온도', v: '−173–127 °C' },\n          { k: '분류', v: '자연 위성' },\n        ],\n        pois: [\n          { id: 'tranq', name: '고요의 바다', sub: '아폴로 11호 최초 유인 착륙 (1969)', lat: 8.5, lon: 31 },\n          { id: 'tycho', name: '티코 크레이터', sub: '밝은 광조를 뻗는 절명의 분화구', lat: -43, lon: -11 },\n          { id: 'copernicus', name: '코페르니쿠스', sub: '충돌 분화구 · 직경 93 km', lat: 10, lon: -20 },\n        ],\n      },\n      {\n        navLabel: 'MARS', designation: 'MARS · SOL IV', name: 'MARS',\n        blurb: '붉은 산화철 표면의 사막 행성. 태양계 최대 화산과 협곡을 품고 있습니다.',\n        hint: '드래그로 시점 이동  ·  휠로 확대/축소',\n        stats: [\n          { k: '지름', v: '6,779 km' },\n          { k: '태양까지', v: '227.9M km' },\n          { k: '표면 중력', v: '3.72 m/s²' },\n          { k: '자전 주기', v: '24h 37m' },\n          { k: '평균 기온', v: '−63 °C' },\n          { k: '위성', v: '2 · Phobos · Deimos' },\n        ],\n      },\n      {\n        navLabel: 'JUPITER', designation: 'JUPITER · SOL V', name: 'JUPITER',\n        blurb: '태양계 최대 가스 행성. 수백 년을 이어온 거대 폭풍, 대적점이 소용돌이칩니다.',\n        hint: '드래그로 시점 이동  ·  휠로 확대/축소',\n        stats: [\n          { k: '지름', v: '139,820 km' },\n          { k: '태양까지', v: '778.5M km' },\n          { k: '표면 중력', v: '24.79 m/s²' },\n          { k: '자전 주기', v: '9h 56m' },\n          { k: '평균 기온', v: '−108 °C' },\n          { k: '위성', v: '95+' },\n        ],\n      },\n      {\n        navLabel: 'SATURN', designation: 'SATURN · SOL VI', name: 'SATURN',\n        blurb: '얼음과 암석 조각으로 이루어진 장대한 고리를 두른 가스 행성.',\n        hint: '드래그로 시점 이동  ·  휠로 확대/축소',\n        stats: [\n          { k: '지름', v: '116,460 km' },\n          { k: '태양까지', v: '1.43B km' },\n          { k: '표면 중력', v: '10.44 m/s²' },\n          { k: '자전 주기', v: '10h 42m' },\n          { k: '고리 폭', v: '~282,000 km' },\n          { k: '위성', v: '146+' },\n        ],\n      },\n    ];\n  }\n\n  renderVals() {\n    const i = this.state ? this.state.station : 0;\n    const D = this._data();\n    const cur = D[i];\n    const nav = D.map((d, idx) => ({\n      label: d.navLabel,\n      idx: '0' + (idx + 1),\n      onClick: () => this.go(idx),\n      active: idx === i,\n      inactive: idx !== i,\n    }));\n    const poi = this.state ? this.state.poi : null;\n    const fmt = (p) => Math.abs(p.lat).toFixed(1) + '°' + (p.lat >= 0 ? 'N' : 'S') + '   ' + Math.abs(p.lon).toFixed(1) + '°' + (p.lon >= 0 ? 'E' : 'W');\n    return {\n      stationKey: 's' + i,\n      designation: cur.designation,\n      name: cur.name,\n      blurb: cur.blurb,\n      hint: cur.hint,\n      stats: cur.stats,\n      nav,\n      poiActive: !!poi,\n      poiName: poi ? poi.name : '',\n      poiSub: poi ? poi.sub : '',\n      poiCoord: poi ? fmt(poi) : '',\n      closePoi: () => this.setState({ poi: null }),\n    };\n  }\n\n  go(idx) {\n    this.setState({ station: idx, poi: null });\n    this.targetStation = idx;\n    if (this.flyTo) this.flyTo(idx);\n  }\n\n\n\n  componentDidMount() {\n    this.targetStation = 0;\n    this._wait();\n  }\n\n  componentWillUnmount() {\n    cancelAnimationFrame(this._raf);\n    if (this.labels) this.labels.forEach((L) => L.el.remove());\n    if (this.controls) this.controls.dispose();\n    if (this.scene) {\n      this.scene.traverse((o) => {\n        if (o.geometry) o.geometry.dispose();\n        const mats = o.material ? (Array.isArray(o.material) ? o.material : [o.material]) : [];\n        mats.forEach((m) => {\n          for (const k in m) { const v = m[k]; if (v && v.isTexture) v.dispose(); }\n          if (m.dispose) m.dispose();\n        });\n      });\n    }\n    if (this.renderer) {\n      this.renderer.dispose();\n      if (this.renderer.forceContextLoss) this.renderer.forceContextLoss();\n    }\n    this._inited = false;\n  }\n\n  _wait() {\n    if (window.__exoReady && window.THREE && window.ExoOrbitControls) { this._init(); return; }\n    setTimeout(() => this._wait(), 60);\n  }\n\n  _init() {\n    if (this._inited) return;\n    const THREE = window.THREE;\n    const canvas = document.getElementById('exo-canvas');\n    if (!canvas) { setTimeout(() => this._init(), 60); return; }\n    this._inited = true;\n\n    const TEX = 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r155/examples/textures/planets/';\n    const PTEX = 'https://cdn.jsdelivr.net/gh/jeromeetienne/threex.planets@master/images/';\n\n    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });\n    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));\n    renderer.setSize(window.innerWidth, window.innerHeight);\n    renderer.toneMapping = THREE.ACESFilmicToneMapping;\n    renderer.toneMappingExposure = 1.18;\n    this.renderer = renderer;\n\n    const scene = new THREE.Scene();\n    this.scene = scene;\n    this._timeMats = [];\n    this._planets = [];\n\n    const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 4000);\n    this.camera = camera;\n    this.camPos = new THREE.Vector3(24, 15, 60);\n    this.curLook = new THREE.Vector3(16, 1, -8);\n    camera.position.copy(this.camPos);\n\n    // lighting — the directional light sits AT the visible sun so lit faces match\n    const sunDir = new THREE.Vector3(-1, 0.12, 0.06).normalize();\n    const sunPos = sunDir.clone().multiplyScalar(340);\n    const sunLight = new THREE.DirectionalLight(0xfff4e6, 3.0);\n    sunLight.position.copy(sunPos);\n    scene.add(sunLight);\n    scene.add(new THREE.AmbientLight(0x14233f, 0.16));\n\n    const loader = new THREE.TextureLoader();\n    loader.setCrossOrigin('anonymous');\n    const sRGB = (t) => { t.colorSpace = THREE.SRGBColorSpace; return t; };\n\n    // ---------- EARTH ----------\n    const earthGroup = new THREE.Group();\n    scene.add(earthGroup);\n    this.earth = earthGroup;\n\n    const earthMat = new THREE.MeshPhongMaterial({\n      color: 0xffffff,\n      map: sRGB(loader.load(TEX + 'earth_atmos_2048.jpg')),\n      specularMap: loader.load(TEX + 'earth_specular_2048.jpg'),\n      normalMap: loader.load(TEX + 'earth_normal_2048.jpg'),\n      shininess: 18,\n      specular: new THREE.Color(0x4a6c92),\n    });\n    const nightTex = loader.load(TEX + 'earth_lights_2048.png');\n    earthMat.onBeforeCompile = (shader) => {\n      shader.uniforms.nightMap = { value: nightTex };\n      shader.uniforms.uSunDir = { value: sunDir };\n      shader.fragmentShader = shader.fragmentShader\n        .replace('#include <common>', '#include <common>\\nuniform sampler2D nightMap;\\nuniform vec3 uSunDir;')\n        .replace('#include <emissivemap_fragment>', '#include <emissivemap_fragment>\\nvec3 vsun = normalize((viewMatrix * vec4(uSunDir,0.0)).xyz);\\nfloat nd = dot(normalize(vNormal), vsun);\\nfloat nf = smoothstep(0.02, -0.25, nd);\\ntotalEmissiveRadiance += texture2D(nightMap, vMapUv).rgb * nf * 1.15;');\n    };\n    const earth = new THREE.Mesh(new THREE.SphereGeometry(10, 96, 96), earthMat);\n    earthGroup.add(earth);\n\n    const clouds = new THREE.Mesh(\n      new THREE.SphereGeometry(10.16, 64, 64),\n      new THREE.MeshPhongMaterial({ map: loader.load(TEX + 'earth_clouds_1024.png'), transparent: true, opacity: 0.85, depthWrite: false })\n    );\n    earthGroup.add(clouds);\n    this.clouds = clouds;\n\n    earthGroup.add(this._atmo(THREE, 10.55, new THREE.Color(0.32, 0.6, 1.0), sunDir));\n\n    // ---------- MOON ----------\n    const moonGroup = new THREE.Group();\n    moonGroup.position.set(34, 2.5, -8);\n    scene.add(moonGroup);\n    this.moon = moonGroup;\n    const moonTex = sRGB(loader.load(TEX + 'moon_1024.jpg'));\n    const moon = new THREE.Mesh(\n      new THREE.SphereGeometry(2.9, 80, 80),\n      new THREE.MeshPhongMaterial({ color: 0x888888, map: moonTex, bumpMap: moonTex, bumpScale: 0.06, shininess: 2 })\n    );\n    moonGroup.add(moon);\n\n    // ---------- SUN (visible light source) ----------\n    const sunGroup = new THREE.Group();\n    sunGroup.position.copy(sunPos);\n    scene.add(sunGroup);\n    this.sunBody = sunGroup;\n    const sunCore = new THREE.Mesh(\n      new THREE.SphereGeometry(26, 96, 96),\n      new THREE.MeshBasicMaterial({ map: sRGB(loader.load(PTEX + 'sunmap.jpg')), toneMapped: false })\n    );\n    sunGroup.add(sunCore);\n    const glowTex = this._glowTexture(THREE);\n    [{ s: 130, o: 0.6, c: 0xffd88c }, { s: 250, o: 0.34, c: 0xff9f44 }, { s: 460, o: 0.16, c: 0xff7a1e }].forEach((g) => {\n      const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTex, color: g.c, transparent: true, opacity: g.o, blending: THREE.AdditiveBlending, depthWrite: false, toneMapped: false }));\n      sp.scale.set(g.s, g.s, 1);\n      sunGroup.add(sp);\n    });\n\n    // ---------- OTHER PLANETS (procedural) ----------\n    const marsPos = new THREE.Vector3(108, 0, 0);\n    const jupPos = new THREE.Vector3(238, 0, 0);\n    const satPos = new THREE.Vector3(430, 0, 0);\n    const mkPlanet = (pos, radius, mat, spin, tilt) => {\n      const g = new THREE.Group();\n      g.position.copy(pos);\n      if (tilt) g.rotation.z = tilt;\n      scene.add(g);\n      const m = new THREE.Mesh(new THREE.SphereGeometry(radius, 80, 80), mat);\n      g.add(m);\n      this._planets.push({ mesh: m, spin: spin });\n      return { g: g, m: m };\n    };\n    const marsMat = new THREE.MeshPhongMaterial({ map: sRGB(loader.load(PTEX + 'marsmap1k.jpg')), bumpMap: loader.load(PTEX + 'marsbump1k.jpg'), bumpScale: 0.12, shininess: 3 });\n    const jupMat = new THREE.MeshPhongMaterial({ map: sRGB(loader.load(PTEX + 'jupitermap.jpg')), shininess: 2 });\n    const satMat = new THREE.MeshPhongMaterial({ map: sRGB(loader.load(PTEX + 'saturnmap.jpg')), shininess: 4 });\n    mkPlanet(marsPos, 5.3, marsMat, 0.0009);\n    mkPlanet(jupPos, 16, jupMat, 0.0017);\n    const sat = mkPlanet(satPos, 12.5, satMat, 0.0014, 0.47);\n    const satRing = this._ringTextured(THREE, loader, sRGB, PTEX, 16.5, 31);\n    satRing.rotation.x = Math.PI * 0.5;\n    sat.g.add(satRing);\n\n    // ---------- surface markers (POIs) ----------\n    const D = this._data();\n    const labelHost = document.getElementById('exo-labels');\n    this.labels = [];\n    const latLon = (lat, lon, R) => {\n      const la = lat * Math.PI / 180, lo = lon * Math.PI / 180;\n      return new THREE.Vector3(R * Math.cos(la) * Math.cos(lo), R * Math.sin(la), -R * Math.cos(la) * Math.sin(lo));\n    };\n    const addMarkers = (group, R, pois, stationIdx) => {\n      (pois || []).forEach((p) => {\n        const local = latLon(p.lat, p.lon, R * 1.008);\n        const anchor = new THREE.Object3D();\n        anchor.position.copy(local);\n        group.add(anchor);\n        const el = document.createElement('button');\n        el.style.cssText = 'position:absolute;left:0;top:0;transform:translate(-9999px,-9999px);display:flex;align-items:center;gap:9px;background:none;border:none;color:#eaf1fb;cursor:pointer;pointer-events:none;opacity:0;font-family:inherit;padding:7px 6px;will-change:transform,opacity;transition:opacity .22s';\n        const dot = document.createElement('span');\n        dot.style.cssText = 'width:9px;height:9px;border-radius:50%;border:1.5px solid #7fb8ff;background:rgba(127,184,255,.22);box-shadow:0 0 10px rgba(127,184,255,.7);flex:none;transition:transform .25s';\n        const tag = document.createElement('span');\n        tag.textContent = p.name;\n        tag.style.cssText = \"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.12em;white-space:nowrap;text-shadow:0 1px 7px rgba(0,0,0,.95);transition:color .25s\";\n        el.appendChild(dot);\n        el.appendChild(tag);\n        el.addEventListener('pointerdown', (ev) => ev.stopPropagation());\n        el.addEventListener('click', (ev) => { ev.stopPropagation(); this.setState({ poi: p }); });\n        labelHost.appendChild(el);\n        this.labels.push({ el, dot, tag, anchor, group, stationIdx, id: p.id, normal: local.clone().normalize() });\n      });\n    };\n    addMarkers(earthGroup, 10, D[2].pois, 2);\n    addMarkers(moonGroup, 2.9, D[3].pois, 3);\n\n    // reusable temporaries\n    this._v1 = new THREE.Vector3();\n    this._v2 = new THREE.Vector3();\n    this._v3 = new THREE.Vector3();\n    this._q1 = new THREE.Quaternion();\n\n    // ---------- STARFIELD ----------\n    const starGeo = new THREE.BufferGeometry();\n    const N = 9000, pos = new Float32Array(N * 3), col = new Float32Array(N * 3);\n    const c = new THREE.Color();\n    for (let k = 0; k < N; k++) {\n      const r = 600 + Math.random() * 1400;\n      const th = Math.acos(2 * Math.random() - 1), ph = Math.random() * Math.PI * 2;\n      pos[k * 3] = r * Math.sin(th) * Math.cos(ph);\n      pos[k * 3 + 1] = r * Math.sin(th) * Math.sin(ph);\n      pos[k * 3 + 2] = r * Math.cos(th);\n      const h = 0.55 + Math.random() * 0.12, l = 0.6 + Math.random() * 0.4;\n      c.setHSL(h, 0.25, Math.random() < 0.85 ? 0.85 : l);\n      col[k * 3] = c.r; col[k * 3 + 1] = c.g; col[k * 3 + 2] = c.b;\n    }\n    starGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));\n    starGeo.setAttribute('color', new THREE.BufferAttribute(col, 3));\n    const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ size: 1.7, sizeAttenuation: true, vertexColors: true, transparent: true, opacity: 0.9, depthWrite: false }));\n    scene.add(stars);\n    this.stars = stars;\n\n    // ---------- camera stations ----------\n    this.stations = [\n      { pos: new THREE.Vector3(-150, 88, 330), look: new THREE.Vector3(200, -10, 0), min: 40, max: 1200 },\n      { pos: sunPos.clone().multiplyScalar(0.62), look: sunPos.clone(), min: 60, max: 720 },\n      { pos: new THREE.Vector3(0, 2.5, 27), look: new THREE.Vector3(0, 0, 0), min: 13, max: 90 },\n      { pos: new THREE.Vector3(34, 5, 3), look: new THREE.Vector3(34, 2.5, -8), min: 4.6, max: 45 },\n      { pos: marsPos.clone().add(new THREE.Vector3(2, 4, 22)), look: marsPos.clone(), min: 7.5, max: 70 },\n      { pos: jupPos.clone().add(new THREE.Vector3(4, 10, 56)), look: jupPos.clone(), min: 24, max: 180 },\n      { pos: satPos.clone().add(new THREE.Vector3(16, 16, 62)), look: satPos.clone(), min: 22, max: 190 },\n    ];\n\n    // ---------- free camera (OrbitControls) ----------\n    const controls = new window.ExoOrbitControls(camera, renderer.domElement);\n    controls.enableDamping = true;\n    controls.dampingFactor = 0.06;\n    controls.rotateSpeed = 0.55;\n    controls.zoomSpeed = 0.85;\n    controls.panSpeed = 0.6;\n    controls.screenSpacePanning = true;\n    const S0 = this.stations[0];\n    controls.target.copy(S0.look);\n    controls.minDistance = S0.min;\n    controls.maxDistance = S0.max;\n    camera.position.copy(S0.pos);\n    this.controls = controls;\n\n    // fly-to a station: tween position + target, then hand back to user\n    this._flying = false;\n    this._flyPos = new THREE.Vector3();\n    this._flyTarget = new THREE.Vector3();\n    this._pendingBounds = null;\n    this.flyTo = (i) => {\n      const S = this.stations[i];\n      this._flyPos.copy(S.pos);\n      this._flyTarget.copy(S.look);\n      this._pendingBounds = { min: S.min, max: S.max };\n      this._flying = true;\n      controls.enabled = false;\n      // widen bounds during travel so the lerp isn't clamped\n      controls.minDistance = 0.1;\n      controls.maxDistance = 4000;\n    };\n    this._flyTo = this.flyTo;\n\n    // ---------- loop ----------\n    const tmp = new THREE.Vector2();\n    const tick = () => {\n      this._raf = requestAnimationFrame(tick);\n      const w = window.innerWidth, h = window.innerHeight;\n      if (w > 0 && h > 0) {\n        const sz = renderer.getSize(tmp);\n        if (Math.abs(sz.x - w) > 1 || Math.abs(sz.y - h) > 1) {\n          renderer.setSize(w, h);\n          camera.aspect = w / h;\n          camera.updateProjectionMatrix();\n        }\n      }\n\n      if (this._flying) {\n        camera.position.lerp(this._flyPos, 0.06);\n        controls.target.lerp(this._flyTarget, 0.06);\n        if (camera.position.distanceTo(this._flyPos) < 0.6) {\n          this._flying = false;\n          controls.enabled = true;\n          if (this._pendingBounds) {\n            controls.minDistance = this._pendingBounds.min;\n            controls.maxDistance = this._pendingBounds.max;\n          }\n        }\n      }\n\n      // gentle planet self-rotation (independent of camera)\n      this.earth.rotation.y += 0.0005;\n      this.moon.rotation.y += 0.00035;\n      this.clouds.rotation.y += 0.0008;\n      this.stars.rotation.y += 0.00003;\n      if (this.sunBody) this.sunBody.rotation.y += 0.0004;\n      const tnow = performance.now() * 0.001;\n      for (let mi = 0; mi < this._timeMats.length; mi++) this._timeMats[mi].uniforms.uTime.value = tnow;\n      for (let pi = 0; pi < this._planets.length; pi++) this._planets[pi].mesh.rotation.y += this._planets[pi].spin;\n\n      controls.update();\n\n      // project surface markers to screen\n      const curPoi = this.state && this.state.poi ? this.state.poi.id : null;\n      const labels = this.labels || [];\n      for (let li = 0; li < labels.length; li++) {\n        const L = labels[li];\n        const wp = L.anchor.getWorldPosition(this._v1);\n        const wn = this._v2.copy(L.normal).applyQuaternion(L.group.getWorldQuaternion(this._q1));\n        const toCam = this._v3.copy(camera.position).sub(wp).normalize();\n        const facing = wn.dot(toCam);\n        const onStation = this.targetStation === L.stationIdx && !this._flying;\n        const proj = wp.project(camera); // wp (=_v1) is mutated to NDC here\n        const inView = proj.z < 1 && proj.x > -1.1 && proj.x < 1.1 && proj.y > -1.1 && proj.y < 1.1;\n        let op = 0;\n        if (onStation && inView && facing > 0.04) op = Math.min(1, (facing - 0.04) * 3.4);\n        const active = curPoi === L.id;\n        if (op > 0.01) {\n          const x = (proj.x * 0.5 + 0.5) * w, y = (-proj.y * 0.5 + 0.5) * h;\n          L.el.style.transform = 'translate(' + x + 'px, ' + y + 'px) translateY(-50%)';\n          L.el.style.opacity = active ? 1 : op;\n          L.el.style.pointerEvents = op > 0.45 ? 'auto' : 'none';\n          L.dot.style.transform = active ? 'scale(1.55)' : 'scale(1)';\n          L.tag.style.color = active ? '#7fb8ff' : '#eaf1fb';\n        } else if (L.el.style.opacity !== '0') {\n          L.el.style.opacity = '0';\n          L.el.style.pointerEvents = 'none';\n          L.el.style.transform = 'translate(-9999px,-9999px)';\n        }\n      }\n\n      renderer.render(scene, camera);\n    };\n    tick();\n  }\n\n  _glowTexture(THREE) {\n    if (this._glow) return this._glow;\n    const c = document.createElement('canvas');\n    c.width = c.height = 128;\n    const ctx = c.getContext('2d');\n    const g = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);\n    g.addColorStop(0, 'rgba(255,255,255,1)');\n    g.addColorStop(0.22, 'rgba(255,255,255,0.85)');\n    g.addColorStop(0.5, 'rgba(255,255,255,0.32)');\n    g.addColorStop(1, 'rgba(255,255,255,0)');\n    ctx.fillStyle = g;\n    ctx.fillRect(0, 0, 128, 128);\n    this._glow = new THREE.CanvasTexture(c);\n    return this._glow;\n  }\n\n  _noiseGLSL() {\n    return '\\nfloat h31(vec3 p){ p=fract(p*0.3183099+vec3(0.1,0.2,0.3)); p*=17.0; return fract(p.x*p.y*p.z*(p.x+p.y+p.z)); }\\n'\n      + 'float vnoise(vec3 x){ vec3 i=floor(x); vec3 f=fract(x); f=f*f*(3.0-2.0*f);\\n'\n      + ' return mix(mix(mix(h31(i+vec3(0.,0.,0.)),h31(i+vec3(1.,0.,0.)),f.x), mix(h31(i+vec3(0.,1.,0.)),h31(i+vec3(1.,1.,0.)),f.x),f.y),\\n'\n      + '            mix(mix(h31(i+vec3(0.,0.,1.)),h31(i+vec3(1.,0.,1.)),f.x), mix(h31(i+vec3(0.,1.,1.)),h31(i+vec3(1.,1.,1.)),f.x),f.y), f.z); }\\n'\n      + 'float fbm(vec3 p){ float v=0.0,a=0.5; for(int i=0;i<5;i++){ v+=a*vnoise(p); p*=2.02; a*=0.5; } return v; }\\n';\n  }\n\n  _planetVertex() {\n    return 'varying vec3 vObj; varying vec3 vWN; varying vec3 vWP; void main(){ vObj=position; vWN=normalize(mat3(modelMatrix)*normal); vec4 wp=modelMatrix*vec4(position,1.0); vWP=wp.xyz; gl_Position=projectionMatrix*viewMatrix*wp; }';\n  }\n\n  _sunMaterial(THREE) {\n    const mat = new THREE.ShaderMaterial({\n      uniforms: { uTime: { value: 0 } },\n      vertexShader: this._planetVertex(),\n      fragmentShader: 'precision highp float; varying vec3 vObj; varying vec3 vWN; varying vec3 vWP; uniform float uTime;' + this._noiseGLSL()\n        + 'void main(){ vec3 p=normalize(vObj);'\n        + ' float g=fbm(p*7.0+vec3(0.0,0.0,uTime*0.03));'\n        + ' float g2=fbm(p*19.0-vec3(uTime*0.06));'\n        + ' float bright=0.55+0.6*g+0.28*g2;'\n        + ' float sp=fbm(p*2.6+5.0); float spot=smoothstep(0.60,0.70,sp);'\n        + ' vec3 col=mix(vec3(1.0,0.66,0.18), vec3(1.0,0.96,0.74), clamp(bright,0.0,1.0));'\n        + ' col=mix(col, vec3(0.42,0.14,0.03), spot*0.85);'\n        + ' vec3 vd=normalize(cameraPosition-vWP); float ndv=clamp(dot(normalize(vWN),vd),0.0,1.0); float limb=pow(ndv,0.45);'\n        + ' col=mix(col*vec3(1.0,0.45,0.16), col, limb);'\n        + ' col*=1.18*clamp(bright,0.3,1.4);'\n        + ' gl_FragColor=vec4(col,1.0); }',\n      toneMapped: false,\n    });\n    this._timeMats.push(mat);\n    return mat;\n  }\n\n  _planetMaterial(THREE, type, sunDir) {\n    const surf = type === 'mars'\n      ? 'vec3 surfaceColor(vec3 p){ float n=fbm(p*3.2); vec3 col=mix(vec3(0.50,0.22,0.11),vec3(0.82,0.46,0.28),n);'\n        + ' float maria=smoothstep(0.48,0.66,fbm(p*5.5+10.0)); col=mix(col,vec3(0.34,0.15,0.09),maria*0.7);'\n        + ' float lat=abs(p.y); float cap=smoothstep(0.80,0.90,lat+(fbm(p*9.0)-0.5)*0.10); col=mix(col,vec3(0.93,0.94,0.97),cap); return col; }'\n      : type === 'jupiter'\n        ? 'vec3 surfaceColor(vec3 p){ float turb=(fbm(p*4.0)-0.5)*0.35; float lat=p.y*2.4+turb; float band=sin(lat*9.0);'\n          + ' vec3 cream=vec3(0.88,0.76,0.56), brown=vec3(0.56,0.36,0.22), tan2=vec3(0.76,0.56,0.37);'\n          + ' vec3 col=mix(brown,cream,smoothstep(-0.5,0.5,band)); col=mix(col,tan2,smoothstep(0.3,0.9,sin(lat*4.0+turb*3.0))*0.5);'\n          + ' vec3 grs=normalize(vec3(0.45,-0.28,0.85)); float dd=distance(normalize(p),grs); col=mix(col,vec3(0.80,0.33,0.18),smoothstep(0.26,0.10,dd)); return col; }'\n        : 'vec3 surfaceColor(vec3 p){ float turb=(fbm(p*4.5)-0.5)*0.22; float lat=p.y*2.6+turb; float band=sin(lat*8.0);'\n          + ' vec3 a=vec3(0.88,0.82,0.64), b=vec3(0.74,0.66,0.46); vec3 col=mix(b,a,smoothstep(-0.5,0.5,band)); return col; }';\n    return new THREE.ShaderMaterial({\n      uniforms: { uSunDir: { value: sunDir } },\n      vertexShader: this._planetVertex(),\n      fragmentShader: 'precision highp float; varying vec3 vObj; varying vec3 vWN; varying vec3 vWP; uniform vec3 uSunDir;' + this._noiseGLSL() + surf\n        + 'void main(){ vec3 p=normalize(vObj); vec3 col=surfaceColor(p);'\n        + ' float lam=max(0.0,dot(normalize(vWN),normalize(uSunDir))); vec3 lit=col*(0.05+1.25*lam);'\n        + ' gl_FragColor=vec4(lit,1.0); }',\n    });\n  }\n\n  _ringMesh(THREE, inner, outer) {\n    const geo = new THREE.RingGeometry(inner, outer, 168, 1);\n    const mat = new THREE.ShaderMaterial({\n      uniforms: { uInner: { value: inner }, uOuter: { value: outer } },\n      vertexShader: 'varying vec3 vObj; void main(){ vObj=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }',\n      fragmentShader: 'precision highp float; varying vec3 vObj; uniform float uInner; uniform float uOuter;' + this._noiseGLSL()\n        + 'void main(){ float r=length(vObj.xy); float t=(r-uInner)/(uOuter-uInner); if(t<0.0||t>1.0) discard;'\n        + ' float bands=0.5+0.5*sin(t*70.0); float detail=fbm(vec3(t*42.0,0.0,0.0));'\n        + ' vec3 col=mix(vec3(0.52,0.46,0.35),vec3(0.86,0.80,0.65),clamp(bands*0.6+detail*0.5,0.0,1.0));'\n        + ' float gap=smoothstep(0.02,0.06,abs(fract(t*5.0)-0.5));'\n        + ' float alpha=(0.22+0.6*bands)*gap*smoothstep(0.0,0.04,t)*smoothstep(1.0,0.95,t);'\n        + ' gl_FragColor=vec4(col,alpha); }',\n      side: THREE.DoubleSide, transparent: true, depthWrite: false,\n    });\n    return new THREE.Mesh(geo, mat);\n  }\n\n  _ringTextured(THREE, loader, sRGB, PTEX, inner, outer) {\n    const geo = new THREE.RingGeometry(inner, outer, 200, 1);\n    const p = geo.attributes.position, uv = geo.attributes.uv, v = new THREE.Vector3();\n    for (let i = 0; i < p.count; i++) { v.fromBufferAttribute(p, i); const u = (v.length() - inner) / (outer - inner); uv.setXY(i, u, 0.5); }\n    uv.needsUpdate = true;\n    const colorTex = sRGB(loader.load(PTEX + 'saturnringcolor.jpg'));\n    const alphaTex = loader.load(PTEX + 'saturnringpattern.gif');\n    colorTex.wrapS = colorTex.wrapT = THREE.ClampToEdgeWrapping;\n    const mat = new THREE.MeshBasicMaterial({ map: colorTex, alphaMap: alphaTex, transparent: true, side: THREE.DoubleSide, depthWrite: false });\n    return new THREE.Mesh(geo, mat);\n  }\n\n  _atmo(THREE, radius, color, sunDir) {\n    const mat = new THREE.ShaderMaterial({\n      uniforms: { glowColor: { value: color }, uSunDir: { value: sunDir } },\n      vertexShader: 'varying vec3 vN; varying vec3 vP; varying vec3 vWN; void main(){ vN = normalize(normalMatrix*normal); vWN = normalize(mat3(modelMatrix)*normal); vec4 mv = modelViewMatrix*vec4(position,1.0); vP = mv.xyz; gl_Position = projectionMatrix*mv; }',\n      fragmentShader: 'varying vec3 vN; varying vec3 vP; varying vec3 vWN; uniform vec3 glowColor; uniform vec3 uSunDir; void main(){ vec3 vd = normalize(-vP); float fres = pow(0.74 - dot(vN, vd), 3.2); fres = clamp(fres,0.0,1.0); float day = smoothstep(-0.4, 0.28, dot(normalize(vWN), normalize(uSunDir))); gl_FragColor = vec4(glowColor, fres * day); }',\n      side: THREE.BackSide, blending: THREE.AdditiveBlending, transparent: true, depthWrite: false,\n    });\n    return new THREE.Mesh(new THREE.SphereGeometry(radius, 64, 64), mat);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
